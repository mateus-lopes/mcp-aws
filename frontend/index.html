<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP AWS — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f4f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); padding: 2rem; width: 100%; max-width: 380px; }
    h1 { font-size: 1.4rem; margin-bottom: 1.5rem; color: #111; }
    label { display: block; font-size: .85rem; color: #444; margin-bottom: .25rem; }
    input { width: 100%; padding: .6rem .75rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: .95rem; margin-bottom: 1rem; }
    input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,.2); }
    button { width: 100%; padding: .7rem; background: #2563eb; color: #fff; border: none; border-radius: 6px; font-size: .95rem; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .toggle { text-align: center; margin-top: 1rem; font-size: .85rem; color: #555; }
    .toggle a { color: #2563eb; cursor: pointer; text-decoration: none; }
    .msg { padding: .6rem; border-radius: 6px; font-size: .85rem; margin-bottom: 1rem; display: none; }
    .msg.error { background: #fee2e2; color: #b91c1c; display: block; }
    .msg.success { background: #dcfce7; color: #166534; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="form-title">Entrar</h1>
    <div class="msg" id="msg"></div>
    <label>E-mail</label>
    <input type="email" id="email" placeholder="seu@email.com" />
    <label>Senha</label>
    <input type="password" id="password" placeholder="••••••••" />
    <button id="btn-submit">Entrar</button>
    <div class="toggle">
      <span id="toggle-text">Não tem conta?</span>
      <a id="toggle-link">Cadastrar</a>
    </div>
  </div>

  <script>
    const API = '/api';
    let isLogin = true;

    document.getElementById('toggle-link').addEventListener('click', () => {
      isLogin = !isLogin;
      document.getElementById('form-title').textContent = isLogin ? 'Entrar' : 'Cadastrar';
      document.getElementById('btn-submit').textContent = isLogin ? 'Entrar' : 'Cadastrar';
      document.getElementById('toggle-text').textContent = isLogin ? 'Não tem conta?' : 'Já tem conta?';
      document.getElementById('toggle-link').textContent = isLogin ? 'Cadastrar' : 'Entrar';
      setMsg('');
    });

    document.getElementById('btn-submit').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) return setMsg('Preencha todos os campos.', 'error');

      const endpoint = isLogin ? '/auth/login' : '/auth/register';
      const res = await fetch(API + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();

      if (!res.ok) return setMsg(data.detail || 'Erro desconhecido.', 'error');

      if (isLogin) {
        localStorage.setItem('token', data.access_token);
        window.location.href = '/dashboard';
      } else {
        setMsg('Conta criada! Faça login.', 'success');
        isLogin = true;
        document.getElementById('form-title').textContent = 'Entrar';
        document.getElementById('btn-submit').textContent = 'Entrar';
      }
    });

    function setMsg(text, type = '') {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg' + (type ? ' ' + type : '');
    }

    if (localStorage.getItem('token')) window.location.href = '/dashboard';
  </script>
</body>
</html>
